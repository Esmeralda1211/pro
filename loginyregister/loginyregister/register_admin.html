<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Personal - Clínica</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .form-container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #2d7cb5; margin-bottom: 20px; }
        .form-row { display: flex; gap: 15px; }
        .form-group { margin-bottom: 15px; flex: 1; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="password"], input[type="email"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2d7cb5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px; font-weight: bold; }
        button:hover { background-color: #1f5a85; }
        .links { text-align: center; margin-top: 15px; font-size: 14px; }
        .links a { color: #2d7cb5; text-decoration: none; font-weight: bold; }
        hr { border: 0; height: 1px; background: #ddd; margin: 20px 0; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Registro del Personal</h2>
    <form action="register_admin.php" method="POST">
        
        <div class="form-row">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="telefono">Teléfono:</label>
                <input type="text" id="telefono" name="telefono">
            </div>
            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo">
            </div>
        </div>

        <div class="form-group">
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
        </div>

        <hr>

        <div class="form-row">
            <div class="form-group">
                <label for="usu_nombre">Nombre de Usuario:</label>
                <input type="text" id="usu_nombre" name="usu_nombre" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
        </div>

        <div class="form-group">
            <label for="tipo_usuario">Rol en la Clínica:</label>
            <select id="tipo_usuario" name="tipo_usuario" required>
                <option value="" disabled selected>Selecciona un rol...</option>
                <option value="Admin">Administrador general</option>
                <option value="Doctor">Doctor / Médico</option>
                <option value="Recepcionista">Recepcionista</option>
            </select>
        </div>

        <button type="submit">Guardar Registro</button>
    </form>
    
    <div class="links">
        ¿Ya tienes cuenta? <a href="login_admin.html">Inicia sesión aquí</a>
    </div>
</div>

</body>
</html>
